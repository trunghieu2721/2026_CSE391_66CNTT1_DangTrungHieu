<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="style21.css">
</head>
<body>
    <h2>Form Đăng Ký Tài Khoản</h2>
    <form id="registerForm">
    <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" id="fullname">
        <small class="error" id="fullnameError"></small>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="text" id="email">
        <small class="error" id="emailError"></small>
    </div>
    <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" id="phone">
        <small class="error" id="phoneError"></small>
    </div>
    <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password">
        <small class="error" id="passwordError"></small>
    </div>
    <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword">
        <small class="error" id="confirmPasswordError"></small>
    </div>
    <div class="form-group">
        <label>Giới tính</label>
        <input type="radio" name="gender" value="Nam"> Nam
        <input type="radio" name="gender" value="Nữ"> Nữ
        <small class="error" id="genderError"></small>
    </div>
    <div class="form-group">
        <input type="checkbox" id="terms">
        Tôi đồng ý với điều khoản
        <small class="error" id="termsError"></small>
    </div>
    <button type="submit">Đăng ký</button>
    </form>
    <div id="successMessage"></div>
    <script src="script21.js"></script>
</body>
</html>
